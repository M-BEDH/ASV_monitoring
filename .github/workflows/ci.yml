name: CI/CD

# Déclenchement : à chaque push ou pull request sur la branche master
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─── Job 1 : Tests backend Symfony ───────────────────────────────────────────
  # Ce job lance les tests PHPUnit du backend Symfony avec une vraie base de données MySQL.
  # Il s'exécute sur une machine virtuelle Ubuntu fraîche fournie par GitHub.
  backend-tests:
    name: Tests backend (Symfony)
    runs-on: ubuntu-latest

    # Service MySQL lancé en conteneur Docker parallèlement au job.
    # GitHub attend que le health-check soit OK avant d'exécuter les steps.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: asv_test           # base dédiée aux tests, isolée de la prod
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # Récupère le code source du dépôt sur le runner
      - uses: actions/checkout@v4

      # Installe PHP 8.2 avec les extensions requises par Symfony et Doctrine
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, intl, zip, apcu
          coverage: none

      # Installe les dépendances PHP déclarées dans composer.json
      - name: Installer les dépendances Composer
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # Génère la paire de clés RSA utilisée pour signer et vérifier les JWT.
      # --skip-if-exists évite de régénérer si elles sont déjà présentes (cache).
      - name: Générer les clés JWT
        working-directory: backend
        run: php bin/console lexik:jwt:generate-keypair --skip-if-exists
        env:
          APP_ENV: test

      # Applique toutes les migrations Doctrine sur la base de test
      - name: Appliquer les migrations
        working-directory: backend
        run: php bin/console doctrine:migrations:migrate --no-interaction
        env:
          APP_ENV: test
          # Les credentials viennent des secrets GitHub, jamais écrits en clair
          DATABASE_URL: mysql://${{ secrets.MYSQL_USER }}:${{ secrets.MYSQL_PASSWORD }}@127.0.0.1:3306/asv_test?serverVersion=8.0&charset=utf8mb4

      # Lance la suite de tests PHPUnit (tests unitaires + tests de contrôleurs API)
      - name: Lancer les tests PHPUnit
        working-directory: backend
        run: php bin/phpunit
        env:
          APP_ENV: test
          DATABASE_URL: mysql://${{ secrets.MYSQL_USER }}:${{ secrets.MYSQL_PASSWORD }}@127.0.0.1:3306/asv_test?serverVersion=8.0&charset=utf8mb4

  # ─── Job 2 : Lint frontend React Native ─────────────────────────────────────
  # Ce job vérifie la qualité du code frontend (TypeScript + ESLint)
  # et valide que le build Expo web se termine sans erreur.
  # Il tourne en parallèle du job backend pour gagner du temps.
  frontend-lint:
    name: Lint frontend (React Native)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Installe Node.js 20 et met en cache node_modules entre les runs
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-web/package-lock.json  # clé de cache basée sur le lock file

      # npm ci est plus strict que npm install : respecte exactement le package-lock.json
      - name: Installer les dépendances npm
        working-directory: mobile-web
        run: npm ci

      # Vérifie les règles ESLint et TypeScript définies dans le projet
      - name: Lint
        working-directory: mobile-web
        run: npm run lint

      # Compile et exporte l'application en version web statique.
      # Si le build échoue, le pipeline s'arrête et le merge est bloqué.
      - name: Build Expo (export web statique)
        working-directory: mobile-web
        run: npx expo export --platform web

  # ─── Job 3 : Build Docker (validation CD) ───────────────────────────────────
  # Ce job représente l'étape de livraison continue (CD).
  # Il ne se déclenche que si :
  #   - les deux jobs CI précédents ont réussi (needs)
  #   - on est sur la branche master (pas sur une PR)
  docker-build:
    name: Build Docker (CD)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint]   # attend la réussite des jobs CI
    if: github.ref == 'refs/heads/master'   # ignoré sur les pull requests

    steps:
      - uses: actions/checkout@v4

      # Construit l'image Docker du backend à partir du Dockerfile.
      # Le tag utilise le SHA du commit pour tracer exactement quelle version est buildée.
      - name: Build image backend
        run: docker build ./backend -t asv-backend:${{ github.sha }}

      # Vérifie que docker-compose.yml est valide avec les variables d'environnement réelles.
      # Détecte les erreurs de configuration sans démarrer les conteneurs.
      - name: Valider la config docker-compose
        run: docker compose config
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
